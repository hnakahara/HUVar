name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (htslib for cyvcf2 / pysam)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev zlib1g-dev libbz2-dev liblzma-dev \
            libdeflate-dev libhts-dev tabix bcftools samtools

      - name: Install package (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Ruff lint
        run: ruff check src tests

      - name: Run unit tests
        # tests/unit must be runnable without the data/ directory present
        run: pytest tests/unit -v --cov=src/acmg_classifier --cov-report=term

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            htmlcov/
          if-no-files-found: ignore
          retention-days: 14
